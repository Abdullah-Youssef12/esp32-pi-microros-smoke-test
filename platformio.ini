[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

board_microros_distro = jazzy
board_microros_transport = serial

build_unflags =
    -std=gnu++11

build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio
